<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>ROCK PAPER SCISSORS</h1>
    <div id="game-container">
        <div id="result"></div>
        <div id="scores">
            <div id="player"></div>
            <div id="computer"></div>
        </div>
        <div id="choice">
            <div id="playerChoice"></div>
            <div id="computerChoice"></div>
        </div>
        <div>
            <button id="rock" class="buttons">🪨</button>
            <button id="paper" class="buttons">📄</button>
            <button id="scissors" class="buttons">✂️</button>
        </div>
    </div>


    <script src="index.js"></script>
</body>
</html>
